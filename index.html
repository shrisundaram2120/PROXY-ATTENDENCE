<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Attendance System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            background: #4facfe;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Proxy Attendance System</h2>

    <form id="attendanceForm">

        <label for="name">Student Name</label>
        <input type="text" id="name" placeholder="Enter student name" required>

        <label for="roll">Roll Number</label>
        <input type="text" id="roll" placeholder="Enter roll number" required>

        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="Enter subject name" required>

        <label for="status">Attendance Status</label>
        <select id="status">
            <option value="Present">Present</option>
            <option value="Proxy">Proxy</option>
            <option value="Absent">Absent</option>
        </select>

        <button type="submit">Submit Attendance</button>

    </form>

    <div class="footer">
        Simple Proxy Attendance UI
    </div>
</div>

<script>
document.getElementById("attendanceForm")
.addEventListener("submit", function(event) {

    event.preventDefault();

    let name = document.getElementById("name").value;
    let roll = document.getElementById("roll").value;
    let subject = document.getElementById("subject").value;
    let status = document.getElementById("status").value;

    alert(
        "Attendance Recorded!\n\n" +
        "Name: " + name +
        "\nRoll No: " + roll +
        "\nSubject: " + subject +
        "\nStatus: " + status
    );

});
</script>

</body>
</html>
